services:
# ------------------------
# Synapse
# ------------------------
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: matrix
    restart: unless-stopped
    ports:
     - 127.0.0.1:6050:8008 #HTTP
     - 127.0.0.1:6051:8448 #Federation
    environment:
     SYNAPSE_SERVER_NAME: https://matrix.${DOMAIN_NAME}
     SYNAPSE_REPORT_STATS: "yes"
     SYNAPSE_CONFIG_PATH: "/data/homeserver.yaml"
    volumes:
     - ./Volumes:/data
    networks:
     - apps
#------------------------
# Synapse-admin
#------------------------
  synapse-admin:
    image: ghcr.io/etkecc/synapse-admin:latest
    container_name: synapse-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    depends_on:
      - synapse
    networks:
      - apps
