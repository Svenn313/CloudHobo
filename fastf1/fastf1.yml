services:
  f1-dashboard:
    image: python:3.11-slim
    container_name: fastf1
    restart: unless-stopped
    ports:
      - "8501:8501"
    working_dir: /app
    volumes:
      - ./volumes/cache:/data/cache
      - ./volumes/app.py:/app/app.py
      - ./volumes/pages:/app/pages
      - ./volumes/requirements.txt:/app/requirements.txt
    environment:
      - TZ=Europe/Paris
    command: >
      sh -c "pip install -r requirements.txt --quiet &&
             streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true"

