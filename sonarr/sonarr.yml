services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.13
    container_name: sonarr
    restart: unless-stopped
    depends_on:
      wiremission:
        condition: service_healthy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Paris/Europe
    volumes:
      - ./volumes:/config
      - ${ARR_DL_DIR}:/downloads
      - ${ARR_MEDIA_DIR}:/media
    network_mode: "service:wiremission"
