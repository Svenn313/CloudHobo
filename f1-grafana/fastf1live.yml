services:
  # ─── Grafana ──────────────────────────────────────────────────
  f1-grafana:
    image: grafana/grafana:latest
    container_name: f1_grafana
    restart: unless-stopped
    networks:
      - apps
    ports:
      - "3100:3000"
    volumes:
      - ./volumes/grafana/data:/var/lib/grafana
      - ./volumes/grafana/provisioning:/etc/grafana/provisioning
      - ./volumes/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/race_results.json

  # ─── FastF1 Loader ────────────────────────────────────────────
  f1-loader:
    image: python:3.11-slim
    container_name: f1_loader
    restart: "no"
    networks:
      - apps
    working_dir: /app
    volumes:
      - ./volumes:/app
      - ./volumes/fastf1-cache:/cache
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PG_SUPER_USER: ${POSTGRES_USER}
      PG_SUPER_PASS: ${POSTGRES_PASS}
      PGDATABASE: ${F1_POSTGRES_DB}
      PGUSER: ${F1_POSTGRES_USER}
      PGPASSWORD: ${F1_POSTGRES_PASS}
      LOAD_TELEMETRY: "true"
      FASTF1_CACHE: /cache
    command: >
      bash -c "pip install --quiet -r requirements.txt &&
               python init_db.py &&
               python loader.py"
