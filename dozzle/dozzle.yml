services:
  dozzle:
    image: amir20/dozzle:v10.6.6
    container_name: dozzle
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - './volumes/:/data'
    environment:
      - DOZZLE_AUTH_PROVIDER=simple
