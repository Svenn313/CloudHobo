##HEDGEDOC##
services:
  hedgedoc:
    image: quay.io/hedgedoc/hedgedoc:1.10.8
    container_name: hedge
    restart: unless-stopped
    environment:
      - CMD_DOMAIN=hedge.${DOMAIN_NAME}
      - CMD_URL_ADDPORT=false
      - CMD_PORT=3000
      - CMD_PROTOCOL_USESSL=true
      - CMD_DB_DIALECT=postgres
      - CMD_DB_URL=postgres://${HD_DATABASE_USER}:${HD_DATABASE_PASS}@postgres:${HD_DATABASE_PORT}/${HD_DATABASE_USER}
      - CMD_DB_HOST=${HD_DATABASE_USER}
      - CMD_DB_DATABASE=${HD_DATABASE_NAME}
      - CMD_DB_PORT=${HD_DATABASE_PORT}
      - CMD_DB_USER=${HD_DATABASE_USER}
      - CMD_DB_PASS=${HD_DATABASE_PASS}
      - CMD_ALLOW_EMAIL_REGISTER=false
      - CMD_SESSION_SECRET=${HD_SESSION_SECRET}
    volumes:
      - './volumes:/hedgedoc/public/uploads'
    ports:
      - 127.0.0.1:6020:3000
    depends_on:
      - postgres
    networks:
       - apps


