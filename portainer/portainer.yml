##PORTAINER##
services:
  portainer:
    image: portainer/portainer-ce:2.40.0
    container_name: portainer_CH
    restart: unless-stopped
    ports:
      - 6040:9443
      - 6041:9000
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - './volumes/data:/data'
    networks:
      - apps
